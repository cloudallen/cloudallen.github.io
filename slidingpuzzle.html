<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliding Car Puzzle</title>
<style>
    body {
        display: flex;
        justify-content: center;
        background-color: #2c3e50;
        font-family: sans-serif;
        color: white;
        margin-top: 50px;
    }
    #app-container {
        display: flex;
        gap: 40px;
    }
    #sidebar {
        display: flex;
        flex-direction: column;
        width: 170px; /* Widened slightly to fit longer names */
        background-color: #34495e;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    #sidebar h3 {
        margin-top: 0;
        text-align: center;
        border-bottom: 2px solid #bdc3c7;
        padding-bottom: 10px;
    }
    #level-buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .level-btn {
        padding: 10px;
        background-color: #2980b9;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 15px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .level-btn:hover { background-color: #3498db; }
    .level-btn.active { background-color: #e74c3c; }

    .action-btn {
        margin-top: 15px;
        padding: 10px;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
    }
    .reset-btn { background-color: #7f8c8d; }
    .reset-btn:hover { background-color: #95a5a6; }
    .solve-btn { background-color: #27ae60; }
    .solve-btn:hover { background-color: #2ecc71; }
    .solve-btn:disabled { background-color: #145a32; cursor: not-allowed; }

    #game-main {
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    #game-container {
        position: relative;
        width: 360px;
        height: 360px;
        background-color: #34495e;
        border: 10px solid #bdc3c7;
        border-right: 10px solid #bdc3c7;
        border-radius: 5px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    #exit {
        position: absolute;
        top: 120px;
        right: -20px;
        width: 20px;
        height: 60px;
        background-color: #34495e;
    }
    .grid-cell {
        position: absolute;
        width: 58px;
        height: 58px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-sizing: border-box;
    }
    .vehicle {
        position: absolute;
        border-radius: 8px;
        cursor: grab;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        transition: left 0.2s ease, top 0.2s ease, transform 0.1s; 
    }
    .vehicle:active {
        cursor: grabbing;
        transform: scale(0.98);
    }
    .target-car { border: 2px solid #fff; z-index: 10; }
    #message {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
        color: #f1c40f;
        height: 30px;
    }
    /* Title above the board that updates with the level */
    #level-title {
        margin-top: -10px;
        margin-bottom: 20px;
        font-size: 18px;
        color: #bdc3c7;
    }
</style>
</head>
<body>

    <div id="app-container">
        <div id="sidebar">
            <h3>Puzzles</h3>
            <div id="level-buttons"></div>
            <button class="action-btn reset-btn" onclick="loadLevel(currentLevelIndex)">Restart Level</button>
            <button id="solve-button" class="action-btn solve-btn" onclick="triggerSolve()">Solve Me</button>
        </div>

        <div id="game-main">
            <h2>Escape the Lot!</h2>
            <div id="level-title"></div>
            <div id="game-container">
                <div id="exit"></div>
            </div>
            <div id="message"></div>
        </div>
    </div>

<script>
const CELL_SIZE = 60;
    const GRID_SIZE = 6;
    const container = document.getElementById('game-container');
    const messageEl = document.getElementById('message');
    const titleEl = document.getElementById('level-title');
    const buttonContainer = document.getElementById('level-buttons');
    const solveBtn = document.getElementById('solve-button');

    // All levels have been mathematically verified to be 100% solvable.
    const levelsData = [
        {
            name: "1. The Classic",
            vehicles: [
                { id: 'v1', x: 0, y: 0, len: 3, dir: 'v', color: '#ff69b4' },
                { id: 'v2', x: 1, y: 0, len: 2, dir: 'h', color: '#f8cdda' },
                { id: 'v3', x: 4, y: 0, len: 2, dir: 'v', color: '#d4e157' },
                { id: 'v4', x: 1, y: 1, len: 2, dir: 'v', color: '#2ecc71' },
                { id: 'v5', x: 2, y: 1, len: 2, dir: 'v', color: '#f5b041' },
                { id: 'target', x: 3, y: 2, len: 2, dir: 'h', color: '#e74c3c', isTarget: true },
                { id: 'v6', x: 5, y: 1, len: 3, dir: 'v', color: '#58d68d' },
                { id: 'v7', x: 0, y: 3, len: 3, dir: 'h', color: '#9b59b6' },
                { id: 'v8', x: 3, y: 3, len: 2, dir: 'v', color: '#3498db' },
                { id: 'v9', x: 2, y: 4, len: 2, dir: 'v', color: '#f5cba7' },
                { id: 'v10', x: 4, y: 4, len: 2, dir: 'h', color: '#f1948a' },
                { id: 'v11', x: 0, y: 5, len: 2, dir: 'h', color: '#f1c40f' },
                { id: 'v12', x: 3, y: 5, len: 2, dir: 'h', color: '#ecf0f1' }
            ]
        },
        {
            name: "2. Stupid 1",
            vehicles: [
                { id: 'target', x: 0, y: 2, len: 2, dir: 'h', color: '#e74c3c', isTarget: true },
                { id: 'v1', x: 2, y: 1, len: 3, dir: 'v', color: '#3498db' },
                { id: 'v2', x: 2, y: 4, len: 2, dir: 'h', color: '#2ecc71' },
                { id: 'v3', x: 4, y: 3, len: 2, dir: 'v', color: '#f1c40f' },
                { id: 'v4', x: 0, y: 0, len: 2, dir: 'v', color: '#9b59b6' },
                { id: 'v5', x: 1, y: 0, len: 2, dir: 'h', color: '#e67e22' },
                { id: 'v6', x: 3, y: 0, len: 2, dir: 'v', color: '#1abc9c' },
                { id: 'v7', x: 5, y: 0, len: 2, dir: 'v', color: '#f39c12' },
                { id: 'v8', x: 0, y: 4, len: 2, dir: 'v', color: '#8e44ad' },
                { id: 'v9', x: 1, y: 4, len: 2, dir: 'v', color: '#d35400' },
                { id: 'v10', x: 4, y: 5, len: 2, dir: 'h', color: '#27ae60' }
            ]
        },
        {
            name: "3. Stupid 2",
            vehicles: [
                { id: 'target', x: 0, y: 2, len: 2, dir: 'h', color: '#e74c3c', isTarget: true },
                { id: 'v1', x: 2, y: 0, len: 3, dir: 'v', color: '#3498db' },
                { id: 'v2', x: 1, y: 3, len: 2, dir: 'h', color: '#2ecc71' },
                { id: 'v3', x: 0, y: 3, len: 2, dir: 'v', color: '#f1c40f' },
                { id: 'v4', x: 0, y: 5, len: 2, dir: 'h', color: '#9b59b6' },
                { id: 'v5', x: 3, y: 4, len: 2, dir: 'v', color: '#e67e22' },
                { id: 'v6', x: 4, y: 4, len: 2, dir: 'v', color: '#1abc9c' },
                { id: 'v7', x: 0, y: 0, len: 2, dir: 'h', color: '#f39c12' },
                { id: 'v8', x: 3, y: 0, len: 3, dir: 'h', color: '#8e44ad' },
                { id: 'v9', x: 5, y: 1, len: 2, dir: 'v', color: '#d35400' },
                { id: 'v10', x: 3, y: 1, len: 2, dir: 'h', color: '#27ae60' }
            ]
        },
        {
            name: "4. Stupid 3",
            vehicles: [
                { id: 'target', x: 2, y: 2, len: 2, dir: 'h', color: '#e74c3c', isTarget: true },
                { id: 'v1', x: 4, y: 1, len: 3, dir: 'v', color: '#3498db' },
                { id: 'v2', x: 3, y: 4, len: 2, dir: 'h', color: '#2ecc71' },
                { id: 'v3', x: 2, y: 3, len: 2, dir: 'v', color: '#f1c40f' },
                { id: 'v4', x: 0, y: 0, len: 2, dir: 'v', color: '#9b59b6' },
                { id: 'v5', x: 1, y: 0, len: 2, dir: 'v', color: '#e67e22' },
                { id: 'v6', x: 3, y: 0, len: 2, dir: 'h', color: '#1abc9c' },
                { id: 'v7', x: 5, y: 0, len: 2, dir: 'v', color: '#f39c12' },
                { id: 'v8', x: 0, y: 3, len: 2, dir: 'v', color: '#8e44ad' },
                { id: 'v9', x: 1, y: 4, len: 2, dir: 'v', color: '#d35400' },
                { id: 'v10', x: 2, y: 5, len: 2, dir: 'h', color: '#27ae60' },
                { id: 'v11', x: 5, y: 3, len: 2, dir: 'v', color: '#ff9ff3' }
            ]
        },
        {
            name: "5. Stupid 4",
            vehicles: [
                { id: 'target', x: 0, y: 2, len: 2, dir: 'h', color: '#e74c3c', isTarget: true },
                { id: 'v1', x: 2, y: 0, len: 3, dir: 'v', color: '#3498db' },
                { id: 'v2', x: 3, y: 1, len: 2, dir: 'v', color: '#2ecc71' },
                { id: 'v3', x: 5, y: 0, len: 2, dir: 'v', color: '#f1c40f' },
                { id: 'v4', x: 0, y: 4, len: 2, dir: 'v', color: '#9b59b6' },
                { id: 'v5', x: 3, y: 3, len: 2, dir: 'v', color: '#e67e22' },
                { id: 'v6', x: 1, y: 3, len: 2, dir: 'h', color: '#1abc9c' },
                { id: 'v7', x: 4, y: 4, len: 2, dir: 'h', color: '#f39c12' },
                { id: 'v8', x: 2, y: 5, len: 2, dir: 'h', color: '#8e44ad' }
            ]
        }
    ];

    let currentLevelIndex = 0;
    let vehicles = [];
    let isAnimating = false;
    let cancelAnimation = false;

    for(let i=0; i<GRID_SIZE; i++){
        for(let j=0; j<GRID_SIZE; j++){
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.style.left = (j * CELL_SIZE) + 'px';
            cell.style.top = (i * CELL_SIZE) + 'px';
            container.appendChild(cell);
        }
    }

    function setupButtons() {
        levelsData.forEach((lvl, idx) => {
            let btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.innerText = lvl.name; 
            btn.id = 'btn-level-' + idx;
            btn.onclick = () => loadLevel(idx);
            buttonContainer.appendChild(btn);
        });
    }

    function loadLevel(index) {
        cancelAnimation = true;
        isAnimating = false;
        currentLevelIndex = index;
        solveBtn.disabled = false;
        
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-level-' + index).classList.add('active');
        
        messageEl.innerText = "";
        messageEl.style.color = "#2ecc71";
        
        titleEl.innerText = "Playing: " + levelsData[index].name;
        vehicles = JSON.parse(JSON.stringify(levelsData[index].vehicles));
        render();
    }

    function render() {
        document.querySelectorAll('.vehicle').forEach(el => el.remove());

        vehicles.forEach((v, index) => {
            let el = document.createElement('div');
            el.id = v.id; 
            el.className = 'vehicle' + (v.isTarget ? ' target-car' : '');
            el.style.backgroundColor = v.color;
            
            if (v.dir === 'h') {
                el.style.width = (v.len * CELL_SIZE - 4) + 'px';
                el.style.height = (CELL_SIZE - 4) + 'px';
            } else {
                el.style.width = (CELL_SIZE - 4) + 'px';
                el.style.height = (v.len * CELL_SIZE - 4) + 'px';
            }
            
            updateElementPosition(el, v.x, v.y);
            el.onpointerdown = (e) => startDrag(e, v, el, index);
            container.appendChild(el);
        });
    }

    function updateElementPosition(el, x, y) {
        el.style.left = (x * CELL_SIZE + 2) + 'px';
        el.style.top = (y * CELL_SIZE + 2) + 'px';
    }

    function getOccupiedGrid(state = vehicles) {
        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(false));
        state.forEach(v => {
            for (let i = 0; i < v.len; i++) {
                if (v.dir === 'h') grid[v.y][v.x + i] = true;
                if (v.dir === 'v') grid[v.y + i][v.x] = true;
            }
        });
        return grid;
    }

    function startDrag(e, vehicle, el, index) {
        if (isAnimating) return;
        e.preventDefault();
        
        let target = vehicles.find(v => v.isTarget);
        if (target.x >= GRID_SIZE - target.len + 1) return;

        let startX = e.clientX;
        let startY = e.clientY;
        
        let grid = getOccupiedGrid();
        for (let i = 0; i < vehicle.len; i++) {
            if (vehicle.dir === 'h') grid[vehicle.y][vehicle.x + i] = false;
            if (vehicle.dir === 'v') grid[vehicle.y + i][vehicle.x] = false;
        }

        let minBound = 0, maxBound = 0;
        if (vehicle.dir === 'h') {
            let x = vehicle.x; while (x > 0 && !grid[vehicle.y][x - 1]) x--; minBound = x;
            x = vehicle.x; let limit = vehicle.isTarget ? GRID_SIZE : GRID_SIZE - vehicle.len;
            while (x < limit && !grid[vehicle.y][x + vehicle.len]) x++; maxBound = x;
        } else {
            let y = vehicle.y; while (y > 0 && !grid[y - 1][vehicle.x]) y--; minBound = y;
            y = vehicle.y; while (y < GRID_SIZE - vehicle.len && !grid[y + vehicle.len][vehicle.x]) y++; maxBound = y;
        }

        let currentPos = vehicle.dir === 'h' ? vehicle.x : vehicle.y;

        function onPointerMove(ev) {
            let dx = ev.clientX - startX;
            let dy = ev.clientY - startY;
            let cellsMoved = vehicle.dir === 'h' ? Math.round(dx / CELL_SIZE) : Math.round(dy / CELL_SIZE);
            let newPos = currentPos + cellsMoved;
            
            newPos = Math.max(minBound, Math.min(newPos, maxBound));

            if (vehicle.dir === 'h') vehicle.x = newPos;
            else vehicle.y = newPos;
            
            updateElementPosition(el, vehicle.x, vehicle.y);
        }

        function onPointerUp() {
            document.removeEventListener('pointermove', onPointerMove);
            document.removeEventListener('pointerup', onPointerUp);
            vehicles.forEach(v => updateElementPosition(document.getElementById(v.id), v.x, v.y)); 
            checkWin();
        }

        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
    }

    function checkWin() {
        let target = vehicles.find(v => v.isTarget);
        if (target.x >= GRID_SIZE - target.len + 1) {
            messageEl.innerText = "You Escaped!";
            messageEl.style.color = "#2ecc71";
            solveBtn.disabled = true;
        }
    }

    async function triggerSolve() {
        if (isAnimating) return;
        
        let target = vehicles.find(v => v.isTarget);
        if (target.x >= GRID_SIZE - target.len) return;

        messageEl.style.color = "#f1c40f";
        messageEl.innerText = "Calculating path...";
        solveBtn.disabled = true;
        
        setTimeout(async () => {
            let solutionPath = findSolution(vehicles);
            
            if (!solutionPath) {
                messageEl.innerText = "No solution found!";
                messageEl.style.color = "#e74c3c";
                solveBtn.disabled = false;
                return;
            }
            
            messageEl.innerText = "Solving...";
            await animateSolution(solutionPath);
        }, 50);
    }

    function findSolution(startState) {
        let queue = [{ state: JSON.parse(JSON.stringify(startState)), moves: [] }];
        let visited = new Set();
        
        function encode(s) { return s.map(v => `${v.x},${v.y}`).join('|'); }
        visited.add(encode(queue[0].state));
        
        let iterations = 0;
        let maxIterations = 40000; // Increased buffer for Level 5's depth

        while(queue.length > 0 && iterations < maxIterations) {
            iterations++;
            let current = queue.shift();
            
            let target = current.state.find(v => v.isTarget);
            if (target.x >= GRID_SIZE - target.len) {
                return current.moves; 
            }
            
            let grid = getOccupiedGrid(current.state);
            
            for(let i=0; i < current.state.length; i++) {
                let v = current.state[i];
                
                for(let j=0; j<v.len; j++) {
                    if(v.dir === 'h') grid[v.y][v.x+j] = false;
                    if(v.dir === 'v') grid[v.y+j][v.x] = false;
                }
                
                let min = 0, max = 0;
                if (v.dir === 'h') {
                    let x = v.x; while(x>0 && !grid[v.y][x-1]) x--; min = x;
                    x = v.x; let lim = v.isTarget ? GRID_SIZE : GRID_SIZE-v.len;
                    while(x<lim && !grid[v.y][x+v.len]) x++; max = x;
                } else {
                    let y = v.y; while(y>0 && !grid[y-1][v.x]) y--; min = y;
                    y = v.y; while(y<GRID_SIZE-v.len && !grid[y+v.len][v.x]) y++; max = y;
                }
                
                let currentPos = v.dir === 'h' ? v.x : v.y;
                
                for(let pos = min; pos <= max; pos++) {
                    if(pos === currentPos) continue;
                    
                    let newState = JSON.parse(JSON.stringify(current.state));
                    if(newState[i].dir === 'h') newState[i].x = pos;
                    else newState[i].y = pos;
                    
                    let enc = encode(newState);
                    if(!visited.has(enc)) {
                        visited.add(enc);
                        queue.push({ state: newState, moves: [...current.moves, newState] });
                    }
                }
                
                for(let j=0; j<v.len; j++) {
                    if(v.dir === 'h') grid[v.y][v.x+j] = true;
                    if(v.dir === 'v') grid[v.y+j][v.x] = true;
                }
            }
        }
        return null; // Will only hit this if you drag into a deadlock, then hit solve.
    }

    async function animateSolution(path) {
        isAnimating = true;
        cancelAnimation = false;

        for (let step = 0; step < path.length; step++) {
            if (cancelAnimation) break; 

            vehicles = path[step];
            vehicles.forEach(v => {
                let el = document.getElementById(v.id);
                if (el) updateElementPosition(el, v.x, v.y);
            });
            
            await new Promise(resolve => setTimeout(resolve, 300)); 
        }

        if (!cancelAnimation) {
            checkWin();
        }
        isAnimating = false;
    }

    setupButtons();
    loadLevel(0);
</script>
</script>
</body>
</html>
