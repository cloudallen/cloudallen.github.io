<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Peg Solitaire</title>
    <style>
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center; 
            background: #f4f7f6; color: #2c3e50; margin: 0; padding: 10px;
            touch-action: manipulation; /* Prevents double-tap zoom delay */
        }
        canvas { 
            background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 100%; height: auto; touch-action: none; /* Crucial for custom dragging */
        }
        .controls { margin: 15px 0; text-align: center; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        button { 
            padding: 12px 18px; font-size: 14px; font-weight: 600; cursor: pointer; 
            background: #3498db; color: white; border: none; border-radius: 8px;
        }
        #status { font-weight: bold; margin-bottom: 10px; color: #e67e22; min-height: 20px; }
    </style>
</head>
<body>
    <h1>Peg Solitaire</h1>
    <div id="status">Select a hole to start</div>
    
    <div class="controls">
        <div class="btn-group">
            <button onclick="resetGame(0)">Hole 0</button>
            <button onclick="resetGame(1)">Hole 1</button>
            <button onclick="resetGame(3)">Hole 3</button>
            <button onclick="resetGame(4)">Hole 4</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('status');
        const radius = 20;
        
        const MOVES = {
            0: [[1, 3], [2, 5]], 1: [[3, 6], [4, 8]], 2: [[4, 7], [5, 9]],
            3: [[1, 0], [4, 5], [6, 10], [7, 12]], 4: [[7, 11], [8, 13]],
            5: [[2, 0], [4, 3], [8, 12], [9, 14]], 6: [[3, 1], [7, 8]],
            7: [[4, 2], [8, 9]], 8: [[4, 1], [7, 6]], 9: [[5, 2], [8, 7]],
            10: [[6, 3], [11, 12]], 11: [[7, 4], [12, 13]],
            12: [[7, 3], [8, 5], [11, 10], [13, 14]], 13: [[8, 4], [12, 11]],
            14: [[9, 5], [13, 12]]
        };

        const points = [];
        const sx = 65, sy = 65;
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c <= r; c++) {
                points.push({ x: 200 - (r * sx / 2) + (c * sx), y: 60 + (r * sy) });
            }
        }

        let pegs = [];
        let draggingIdx = null;
        let mousePos = { x: 0, y: 0 };

        function resetGame(idx) {
            pegs = new Array(15).fill(true);
            pegs[idx] = false;
            statusMsg.innerText = "Game Started";
            draw();
        }

        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - r.left, y: clientY - r.top };
        }

        function handleStart(e) {
            const pos = getPos(e);
            points.forEach((p, i) => {
                if (Math.hypot(p.x - pos.x, p.y - pos.y) < radius + 10 && pegs[i]) draggingIdx = i;
            });
            if(e.touches) e.preventDefault();
        }

        function handleMove(e) {
            if (draggingIdx === null) return;
            mousePos = getPos(e);
            draw();
            if(e.touches) e.preventDefault();
        }

        function handleEnd(e) {
            if (draggingIdx === null) return;
            points.forEach((p, target) => {
                if (Math.hypot(p.x - mousePos.x, p.y - mousePos.y) < radius + 15 && !pegs[target]) {
                    const jump = MOVES[draggingIdx].find(m => m[1] === target);
                    if (jump && pegs[jump[0]]) {
                        pegs[draggingIdx] = false; pegs[jump[0]] = false; pegs[target] = true;
                        checkGameState();
                    }
                }
            });
            draggingIdx = null;
            draw();
        }

        function checkGameState() {
            let count = 0, canMove = false;
            for(let i=0; i<15; i++) {
                if(pegs[i]) {
                    count++;
                    if(MOVES[i].some(m => pegs[m[0]] && !pegs[m[1]])) canMove = true;
                }
            }
            if(!canMove) statusMsg.innerText = count === 1 ? "🏆 Perfect!" : `Game Over: ${count} left`;
        }

        // Event Listeners for both Mouse and Touch
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleEnd);

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            points.forEach((p, i) => {
                ctx.beginPath(); ctx.arc(p.x, p.y, radius, 0, 7);
                ctx.fillStyle = '#ecf0f1'; ctx.fill();
                ctx.strokeStyle = '#bdc3c7'; ctx.stroke();
                if (pegs[i] && i !== draggingIdx) drawPeg(p.x, p.y, '#2c3e50');
            });
            if (draggingIdx !== null) drawPeg(mousePos.x, mousePos.y, '#3498db');
        }

        function drawPeg(x, y, color) {
            ctx.beginPath(); ctx.arc(x, y, radius - 4, 0, 7);
            ctx.fillStyle = color; ctx.fill();
        }

        resetGame(0);
    </script>
</body>
</html>
